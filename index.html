<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <script src="javascript.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 2L14 6.5V17.5L19 13V2M6.5 5C4.55 5 2.45 5.4 1 6.5V21.16C1 21.41 1.25 21.66 1.5 21.66C1.6 21.66 1.65 21.59 1.75 21.59C3.1 20.94 5.05 20.5 6.5 20.5C8.45 20.5 10.55 20.9 12 22C13.35 21.15 15.8 20.5 17.5 20.5C19.15 20.5 20.85 20.81 22.25 21.56C22.35 21.61 22.4 21.59 22.5 21.59C22.75 21.59 23 21.34 23 21.09V6.5C22.4 6.05 21.75 5.75 21 5.5V19C19.9 18.65 18.7 18.5 17.5 18.5C15.8 18.5 13.35 19.15 12 20V6.5C10.55 5.4 8.45 5 6.5 5Z" /></svg>
            </div>
            <div class="btns">
                <button class="theme">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 12A10 10 0 0 0 15 21.54A10 10 0 0 1 15 2.46A10 10 0 0 0 2 12Z"/></svg>
                </button>
                <button class="add">ADD NEW BOOK</button>
            </div>
            <dialog class="book-dialog">
                <form class="book-form">
                    <h2>Add Book</h2>
                    <p>
                        <label>
                            Title:
                            <input type="text" id="title" required>
                        </label>
                    </p>
                    <p>
                        <label>
                            Author:
                            <input type="text" id="author" required>
                        </label>
                    </p>
                    <p>
                        <label>
                            Year:
                            <input type="number" id="year" required>
                        </label>
                    </p>
                    <p>
                    <label>
                            Read
                            <input type="checkbox" id="read">
                        </label>
                    </p>
                    <p>Section:
                        <input type="radio" id="my-books" name="section" value="my-books" checked>
                        <label for="my-books">My Books</label>

                        <input type="radio" id="my-wishlist" name="section" value="wishlist">
                        <label for="my-wishlist">Wishlist</label>
                    </p>

                    <button type="submit">Add Book</button>
                    <button type="button" id="cancel-btn">Cancel</button>
                </form>
            </dialog>
        </div>
        <div class="library">
            <div class="my-books">MY BOOKS</div>
            <div class="my-library"></div>
            <div class="my-wishlist">WISHLIST</div>
            <div class="wishlist-library"></div>
        </div>
    </div>
</body>
</html>
